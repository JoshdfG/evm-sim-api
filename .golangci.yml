run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - gosec
    - misspell
    - unconvert
    - unparam

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
  gosec:
    excludes:
      - G104  # handled by errcheck

issues:
  exclude-rules:
    # Relax rules inside test files.
    - path: "_test\\.go"
      linters:
        - gosec
        - errcheck
        - unparam
