version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/repo/sqlc/query.sql"
    schema:  "migrations/"
    gen:
      go:
        package:               "sqlcgen"
        out:                   "internal/repo/sqlcgen"
        emit_json_tags:        true
        emit_prepared_queries: false
        emit_interface:        true
        emit_exact_table_names: false
